name: 'Doc Holiday Action'
description: 'Automatically generate release notes and documentation using doc.holiday'
author: 'Sandgarden'

branding:
  icon: 'book-open'
  color: 'green'

inputs:
  api-token:
    description: 'Doc.holiday API token (store in GitHub secrets)'
    required: true

  body:
    description: 'Natural language request to Doc Holiday for what you want written'
    required: true

  publication:
    description: 'Publication ID or name'
    required: false

  stage:
    description: 'If true, work does not immediately result in an opened PR'
    required: false

  labels:
    description: 'Comma-separated labels'
    required: false

  relevant-links:
    description: 'Comma-separated URLs for additional context'
    required: false

  releases-count:
    description: 'Number of recent releases to include'
    required: false

  time-range-start:
    description: 'Time range start (ISO 8601 timestamp)'
    required: false

  time-range-end:
    description: 'Time range end (ISO 8601 timestamp)'
    required: false

  commits-count:
    description: 'Number of recent commits'
    required: false

  commits-since-sha:
    description: 'Start from specific commit SHA'
    required: false

  commits-shas:
    description: 'Comma-separated list of specific commit SHAs'
    required: false

  commits-start-sha:
    description: 'Commit range start SHA'
    required: false

  commits-end-sha:
    description: 'Commit range end SHA'
    required: false

  commits-include-start:
    description: 'Include start commit in range (true/false)'
    required: false

  tags-start:
    description: 'Start tag'
    required: false

  tags-end:
    description: 'End tag'
    required: false

outputs:
  id:
    description: 'Work state ID'

  job-id:
    description: 'Associated job ID'

  out-id:
    description: 'Output identifier'

  org-id:
    description: 'Organization ID'

  status:
    description: 'Work state status (requested, running, done, errored)'

  publication-id:
    description: 'Publication ID'

  connection-id:
    description: 'Connection ID'

  publication-name:
    description: 'Publication name'

  trigger-type:
    description: 'Trigger type'

  operation-type:
    description: 'Operation type'

  created-at:
    description: 'Creation timestamp (RFC3339)'

  updated-at:
    description: 'Last update timestamp (RFC3339)'

  branch:
    description: 'Branch name'

  title:
    description: 'Title'

  summary:
    description: 'Summary'

  output-url:
    description: 'Output URL'

  staged:
    description: 'Whether the work state is staged'

  excluded-files:
    description: 'JSON array of excluded file paths'

  entries:
    description: 'JSON array of work history entries'

runs:
  using: 'node24'
  main: 'dist/index.js'
