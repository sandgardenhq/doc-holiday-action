name: Run Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Verify dist/ is up to date
        run: |
          if ! git diff --quiet --exit-code dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build && npm run package' and commit the result."
            git diff dist/
            exit 1
          fi
